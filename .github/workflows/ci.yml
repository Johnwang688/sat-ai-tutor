# Builds the Next.js app in GitHub Actions (where all secrets are available)
# and deploys the pre-built output to Vercel.
#
# GitHub is the single source of truth for all secrets.
# Vercel's Git-triggered builds are disabled; CI handles the full pipeline.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#
#   Vercel:
#     VERCEL_TOKEN             – https://vercel.com/account/tokens
#     VERCEL_ORG_ID            – from .vercel/project.json (run `vercel link` locally once)
#     VERCEL_PROJECT_ID        – from .vercel/project.json
#
#   Supabase + DB:
#     NEXT_PUBLIC_SUPABASE_URL
#     NEXT_PUBLIC_SUPABASE_ANON_KEY
#     SUPABASE_SERVICE_ROLE_KEY
#     DATABASE_URL
#
#   AI / Integrations:
#     OPENAI_API_KEY
#     DESMOS_API_KEY

name: CI & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      # App env vars — available during build so next.config.ts can bake NEXT_PUBLIC_* into the bundle
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DESMOS_API_KEY: ${{ secrets.DESMOS_API_KEY }}
      NEXT_PUBLIC_DESMOS_API_KEY: ${{ secrets.DESMOS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Verify required secrets
        run: |
          missing=0
          for var in \
            VERCEL_ORG_ID \
            VERCEL_PROJECT_ID \
            NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_ANON_KEY \
            SUPABASE_SERVICE_ROLE_KEY \
            DATABASE_URL \
            OPENAI_API_KEY
          do
            if [ -z "$(printenv "$var" 2>/dev/null || true)" ]; then
              echo "::error::$var is not set. Add it as a repository secret."
              missing=1
            fi
          done
          if [ -z "$(printenv DESMOS_API_KEY 2>/dev/null || true)" ]; then
            echo "::warning::DESMOS_API_KEY is empty; Desmos interactive calculator will be unavailable."
          fi
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::VERCEL_TOKEN is not set. Create one at https://vercel.com/account/tokens"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      # Sync all runtime env vars to Vercel so server-side API routes
      # (e.g. /api/desmos/config, OpenAI calls) can read them at request time.
      - name: Sync environment variables to Vercel
        run: |
          sync() {
            local name="$1" val="$2"
            [ -z "$val" ] && return 0
            vercel env rm "$name" production --yes --token="${{ secrets.VERCEL_TOKEN }}" 2>/dev/null || true
            printf '%s' "$val" | vercel env add "$name" production --token="${{ secrets.VERCEL_TOKEN }}"
          }
          sync NEXT_PUBLIC_SUPABASE_URL      "$NEXT_PUBLIC_SUPABASE_URL"
          sync NEXT_PUBLIC_SUPABASE_ANON_KEY "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          sync SUPABASE_SERVICE_ROLE_KEY     "$SUPABASE_SERVICE_ROLE_KEY"
          sync DATABASE_URL                  "$DATABASE_URL"
          sync OPENAI_API_KEY                "$OPENAI_API_KEY"
          sync DESMOS_API_KEY                "$DESMOS_API_KEY"
          sync NEXT_PUBLIC_DESMOS_API_KEY    "$NEXT_PUBLIC_DESMOS_API_KEY"

      # Pull Vercel project config (.vercel/project.json, framework settings)
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        working-directory: apps/web

      # Build inside CI where all env vars are present.
      # next.config.ts bakes NEXT_PUBLIC_* into the client JS bundle.
      - name: Build
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        working-directory: apps/web

      - name: Deploy to Vercel
        run: |
          url=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "Deployed to: $url"
          echo "### Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "$url" >> "$GITHUB_STEP_SUMMARY"
        working-directory: apps/web
